<!doctype html>
<html>
  <head>
    <title>Layout-Beispiele</title>
    <meta charset="utf-8" />
  </head>
  <body style="background: #64c1f4">
    <main>
      <img src="img/640-400.png" alt="JavaScript" title="JavaScript" />

      <!-- Bildattribute:

	align      Bestimmt die Ausrichtung des Bildes und den Textumfluss.
	alt        Alternativtext für das Bild.
	border     Legt die Rahmenstärke des Bildes fest.
	height     Höhe des Bildes.
	hspace     Horizontaler Abstand zwischen Bild und umgebendem Inhalt.
	ismap      Kennzeichnet das Bild als serverseitige Image-Map.
	longdesc   Verweist auf ein Dokument mit einer ausführlichen Bildbeschreibung.
	lowsrc     Gibt die Adresse eines Bildes mit niedriger Qualität an.
	src        Pfad zur Bilddatei.
	vspace     Vertikaler Abstand zwischen Bild und umgebendem Inhalt.
	width      Breite des Bildes.
-->
      <!--
Hinweis:
Einige der oben genannten Attribute gelten heute als veraltet (deprecated)
und werden in modernen HTML5-Projekten nicht mehr verwendet.
-->

      <a href=""></a>
      <!-- Linkattribute:

	accesskey  Aktiviert den Link über eine Tastenkombination.
	coords     Legt die Koordinaten des aktiven Bereichs fest.
	download   Bietet den Download der verlinkten Datei an.
	href       Gibt die Zieladresse des Links an.
	hreflang   Gibt die Sprache des verlinkten Dokuments an.
	name       Legt den Namen eines Ankers innerhalb des Dokuments fest.
	rel        Definiert die Beziehung zwischen dem aktuellen und dem verlinkten Dokument.
	rev        Definiert die Beziehung zwischen dem verlinkten und dem aktuellen Dokument.
	shape      Legt die Form des aktiven Bereichs bei Bildlinks fest.
	tabindex   Bestimmt die Reihenfolge der Navigation mit der Tabulatortaste.
	target     Legt fest, in welchem Fenster oder Frame das Dokument geöffnet wird.
	title      Fügt einen Tooltip zum Link hinzu.
	type       Gibt den MIME-Typ des verlinkten Dokuments an.
-->
      <!--
Hinweis:
Einige der oben genannten Attribute (z. B. coords, name, rev und shape)
gelten heute als veraltet oder werden nur noch selten verwendet.
-->
    </main>
    <footer>
      <p>© 2026 Pavel Nesnamov</p>
    </footer>
  </body>
</html>
